<section class="card">
  <div class="section-header">
    <h2>Produkty</h2>
    <button type="button" (click)="openCreateForm()">Dodaj produkt</button>
  </div>

  <p class="error-text" *ngIf="loadError">{{ loadError }}</p>

  <ul class="list" *ngIf="products.length; else emptyState">
    <li *ngFor="let product of products">
      <span>{{ product.name }}</span>
    </li>
  </ul>

  <ng-template #emptyState>
    <p class="muted">Brak produktów</p>
  </ng-template>

  <form *ngIf="isFormOpen" class="inline-form" #productForm="ngForm" (ngSubmit)="submitForm()">
    <h3>Dodaj produkt</h3>
    <label>
      Nazwa produktu
      <input
        type="text"
        name="name"
        [(ngModel)]="formModel.name"
        required
        minlength="1"
        maxlength="100"
        placeholder="np. Shoes"
      />
    </label>
    <p class="error-text" *ngIf="submitError">{{ submitError }}</p>
    <div class="actions">
      <button type="submit" [disabled]="productForm.invalid || isSubmitting">Zapisz</button>
      <button type="button" (click)="closeForm()">Anuluj</button>
    </div>
  </form>
</section>
