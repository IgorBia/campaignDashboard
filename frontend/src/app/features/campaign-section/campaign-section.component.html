<section class="card">
  <div class="section-header">
    <h2>Campaigns</h2>
    <button type="button" (click)="openCreateForm()">Add campaign</button>
  </div>

  <p class="error-text" *ngIf="loadError">{{ loadError }}</p>
  <p class="error-text" *ngIf="submitError">{{ submitError }}</p>

  <ul class="list" *ngIf="campaigns.length; else emptyState">
    <li *ngFor="let campaign of campaigns">
      <div class="campaign-item">
        <strong>{{ campaign.name }}</strong>
        <small>{{ campaign.productName }} · {{ campaign.town.name }} · {{ campaign.campaignFund }} USD</small>
      </div>
      <div class="actions">
        <button type="button" (click)="openEditForm(campaign)">Edit</button>
        <button type="button" (click)="deleteCampaign(campaign.id)">Delete</button>
      </div>
    </li>
  </ul>

  <ng-template #emptyState>
    <p class="muted">No campaigns</p>
  </ng-template>

  <form *ngIf="isFormOpen" class="inline-form" #campaignForm="ngForm" (ngSubmit)="submitForm()">
    <h3>{{ editingCampaignId ? 'Edit campaign' : 'Add campaign' }}</h3>
    <label class="field-row">
      <span>Product</span>
      <select
        name="productId"
        [(ngModel)]="formModel.productId"
        required
      >
        <option *ngFor="let product of products" [ngValue]="product.id">{{ product.name }}</option>
      </select>
    </label>
    <label class="field-row">
      <span>Campaign name</span>
      <input
        type="text"
        name="name"
        [(ngModel)]="formModel.name"
        required
        minlength="1"
        maxlength="120"
        placeholder="e.g. Summer Promo"
      />
    </label>

    <label class="field-row">
      <span>Keywords (typeahead)</span>
      <input
        type="text"
        name="keywordQuery"
        [(ngModel)]="keywordQuery"
        (ngModelChange)="onKeywordQueryChange()"
        placeholder="Type e.g. sport"
      />
    </label>

    <ul class="typeahead-list" *ngIf="keywordSuggestions.length">
      <li *ngFor="let keyword of keywordSuggestions">
        <button type="button" (click)="addKeyword(keyword)">{{ keyword.value }}</button>
      </li>
    </ul>

    <div class="chips" *ngIf="selectedKeywords.length">
      <span class="chip" *ngFor="let keyword of selectedKeywords">
        {{ keyword.value }}
        <button type="button" (click)="removeKeyword(keyword.id)">×</button>
      </span>
    </div>

    <label class="field-row">
      <span>Bid amount</span>
      <input
        type="number"
        name="bidAmount"
        [(ngModel)]="formModel.bidAmount"
        required
        min="0.01"
        step="0.01"
      />
    </label>
    <label class="field-row">
      <span>Campaign fund</span>
      <input
        type="number"
        name="campaignFund"
        [(ngModel)]="formModel.campaignFund"
        required
        min="0.01"
        step="0.01"
      />
    </label>

    <label class="field-row">
      <span>Status</span>
      <select name="status" [(ngModel)]="formModel.status" required>
        <option value="ON">ON</option>
        <option value="OFF">OFF</option>
      </select>
    </label>

    <label class="field-row">
      <span>Town</span>
      <select
        name="townId"
        [(ngModel)]="formModel.townId"
        required
      >
        <option *ngFor="let town of towns" [ngValue]="town.id">{{ town.name }}</option>
      </select>
    </label>

    <label class="field-row">
      <span>Radius (km)</span>
      <input
        type="number"
        name="radiusKm"
        [(ngModel)]="formModel.radiusKm"
        required
        min="1"
        step="1"
      />
    </label>

    <div class="actions">
      <button type="submit" [disabled]="campaignForm.invalid || !selectedKeywords.length || isSubmitting">Save</button>
      <button type="button" (click)="closeForm()">Cancel</button>
    </div>
  </form>
</section>
