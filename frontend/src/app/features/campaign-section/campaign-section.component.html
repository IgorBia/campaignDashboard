<section class="card">
  <div class="section-header">
    <h2>Kampanie</h2>
    <button type="button" (click)="openCreateForm()">Dodaj kampanię</button>
  </div>

  <p class="error-text" *ngIf="loadError">{{ loadError }}</p>

  <ul class="list" *ngIf="campaigns.length; else emptyState">
    <li *ngFor="let campaign of campaigns">
      <div class="campaign-item">
        <strong>{{ campaign.name }}</strong>
        <small>{{ campaign.productName }} · {{ campaign.town.name }} · {{ campaign.campaignFund }}</small>
      </div>
    </li>
  </ul>

  <ng-template #emptyState>
    <p class="muted">Brak kampanii</p>
  </ng-template>

  <form *ngIf="isFormOpen" class="inline-form" #campaignForm="ngForm" (ngSubmit)="submitForm()">
    <h3>Dodaj kampanię</h3>
    <label>
      Produkt
      <select
        name="productId"
        [(ngModel)]="formModel.productId"
        required
      >
        <option *ngFor="let product of products" [ngValue]="product.id">{{ product.name }}</option>
      </select>
    </label>
    <label>
      Nazwa kampanii
      <input
        type="text"
        name="name"
        [(ngModel)]="formModel.name"
        required
        minlength="1"
        maxlength="120"
        placeholder="np. Summer Promo"
      />
    </label>

    <label>
      Keywords (typeahead)
      <input
        type="text"
        name="keywordQuery"
        [(ngModel)]="keywordQuery"
        (ngModelChange)="onKeywordQueryChange()"
        placeholder="Wpisz np. sport"
      />
    </label>

    <ul class="typeahead-list" *ngIf="keywordSuggestions.length">
      <li *ngFor="let keyword of keywordSuggestions">
        <button type="button" (click)="addKeyword(keyword)">{{ keyword.value }}</button>
      </li>
    </ul>

    <div class="chips" *ngIf="selectedKeywords.length">
      <span class="chip" *ngFor="let keyword of selectedKeywords">
        {{ keyword.value }}
        <button type="button" (click)="removeKeyword(keyword.id)">×</button>
      </span>
    </div>

    <label>
      Bid amount
      <input
        type="number"
        name="bidAmount"
        [(ngModel)]="formModel.bidAmount"
        required
        min="0.01"
        step="0.01"
      />
    </label>
    <label>
      Campaign fund
      <input
        type="number"
        name="campaignFund"
        [(ngModel)]="formModel.campaignFund"
        required
        min="0.01"
        step="0.01"
      />
    </label>

    <label>
      Status
      <select name="status" [(ngModel)]="formModel.status" required>
        <option value="ON">ON</option>
        <option value="OFF">OFF</option>
      </select>
    </label>

    <label>
      Town
      <select
        name="townId"
        [(ngModel)]="formModel.townId"
        required
      >
        <option *ngFor="let town of towns" [ngValue]="town.id">{{ town.name }}</option>
      </select>
    </label>

    <label>
      Radius (km)
      <input
        type="number"
        name="radiusKm"
        [(ngModel)]="formModel.radiusKm"
        required
        min="1"
        step="1"
      />
    </label>

    <p class="error-text" *ngIf="submitError">{{ submitError }}</p>

    <div class="actions">
      <button type="submit" [disabled]="campaignForm.invalid || !selectedKeywords.length || isSubmitting">Zapisz</button>
      <button type="button" (click)="closeForm()">Anuluj</button>
    </div>
  </form>
</section>
